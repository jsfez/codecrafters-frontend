name: Argos

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  argos:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    permissions:
      contents: read
      id-token: write # Argos authenticates through GitHub Actions OIDC, no token to store

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.5'

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Install Argos dependencies
        run: npm install --prefix argos --no-audit --no-fund

      - name: Install Chromium
        run: ./argos/node_modules/.bin/playwright install --with-deps chromium

      - name: Build the test environment
        run: bunx ember build --environment=test
        env:
          PERCY_ENABLE: 'true'
          PERCY_SERVER_ADDRESS: 'http://localhost:6103'
          STRIPE_PUBLISHABLE_KEY: 'dummy'

      - name: Run the acceptance suite and send screenshots to Argos
        run: ./argos/node_modules/.bin/playwright test --config argos/playwright.config.ts
        env:
          ARGOS_SPLIT: '4'
